name: Saku Overclock CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: recursive # Рекурсивно выкачиваем все подмодули (Shared, CrashHandler, Core, ZenStates.Core)

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup MSBuild Tooling
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: dotnet restore "Saku Overclock.sln"
      
    - name: Create Temporary Self-Signed Certificate for Package Signing
      shell: powershell
      run: |
        $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=Sakura" -CertStoreLocation "Cert:\CurrentUser\My"
        $password = ConvertTo-SecureString "SakuPassword123" -AsPlainText -Force
        
        # Экспортируем в совместимом со старыми утилитами формате
        Export-PfxCertificate -Cert $cert -FilePath "${{ github.workspace }}\CI_SigningCert.pfx" -Password $password -CryptoAlgorithmOption TripleDES_SHA1


    - name: Compile and Package MSIX (Release x64)
      shell: powershell
      run: |
        msbuild "Saku Overclock\Saku Overclock.csproj" `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:EnableMsixTooling=true `
          /p:AppxPackageSigningEnabled=false `
          /p:AppxPackageDir="${{ github.workspace }}\BuildArtifacts\" `
          /p:AppxBundle=Never

    - name: Debug File System Layout
      shell: powershell
      run: |
        Write-Output "========================================================="
        Write-Output " СОДЕРЖИМОЕ BuildArtifacts "
        Write-Output "========================================================="
        if (Test-Path "${{ github.workspace }}\BuildArtifacts") {
            Get-ChildItem -Path "${{ github.workspace }}\BuildArtifacts" -Recurse | Select-Object @{Name="RelativePath"; Expression={$_.FullName.Replace("${{ github.workspace }}\", "")}}
        } else {
            Write-Output "Папка BuildArtifacts вообще не была создана!"
        }

        Write-Output "========================================================="
        Write-Output " BIN ПРОЕКТА"
        Write-Output "========================================================="
        if (Test-Path "${{ github.workspace }}\Saku Overclock\bin") {
            Get-ChildItem -Path "${{ github.workspace }}\Saku Overclock\bin" -Recurse | Where-Object { $_.Extension -eq ".msix" -or $_.Name -eq "AppPackages" } | Select-Object @{Name="RelativePath"; Expression={$_.FullName.Replace("${{ github.workspace }}\", "")}}
        }
        
    - name: Sign MSIX Package via SignTool
      shell: powershell
      run: |
        # Находим signtool в установленном Windows SDK
        $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recurse | Where-Object { $_.DirectoryName -like "*x64*" } | Select-Object -First 1).FullName
        
        # Находим скомпилированный msix-файл
        $msixFile = (Get-ChildItem -Path "${{ github.workspace }}\BuildArtifacts" -Filter "*.msix" -Recurse | Select-Object -First 1).FullName
        
        Write-Output "Signing package: $msixFile using $signtool"
        
        # Подписываем пакет напрямую
        & $signtool sign /v /fd SHA256 /f "${{ github.workspace }}\CI_SigningCert.pfx" /p "SakuPassword123" $msixFile
        
    - name: Upload Finished MSIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Saku-Overclock-MSIX-Package
        path: BuildArtifacts\**\*.msix
        if-no-files-found: error
        
