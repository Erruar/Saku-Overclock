name: Saku Overclock CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: recursive # Рекурсивно выкачиваем все подмодули (Shared, CrashHandler, Core, ZenStates.Core)

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup MSBuild Tooling
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: dotnet restore "Saku Overclock.sln"
      
    - name: Decode and Import Production Certificate
      shell: powershell
      env:
        CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
        CERT_PASS: ${{ secrets.CERT_PASSWORD }}
      run: |
        if (-not $env:CERT_BASE64) {
            Write-Error "CRITICAL: SIGNING_CERT_BASE64 secret is missing in GitHub Secrets!"
            exit 1
        }
        
        # Очищаем Base64 от возможных случайных пробелов/переносов строк
        $cleanBase64 = $env:CERT_BASE64.Trim()
        $certBytes = [System.Convert]::FromBase64String($cleanBase64)
        $certPath = "${{ github.workspace }}\CI_SigningCert.pfx"
        [System.IO.File]::WriteAllBytes($certPath, $certBytes)
        
        # Очищаем пароль от возможных пробелов, которые могли попасть при копировании в Secrets
        $cleanPass = $env:CERT_PASS.Trim()
        $password = ConvertTo-SecureString $cleanPass -AsPlainText -Force
        
        try {
            Import-PfxCertificate -FilePath $certPath -CertStoreLocation "Cert:\CurrentUser\My" -Password $password
            Write-Output "Production certificate successfully imported into Windows Store."
        } catch {
            Write-Error "Failed to import certificate. Error details: $_"
            exit 1
        }

    - name: Compile and Package MSIX (Release x64)
      shell: powershell
      run: |
        msbuild "Saku Overclock\Saku Overclock.csproj" `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:EnableMsixTooling=true `
          /p:GenerateAppxPackageOnBuild=true `
          /p:AppxPackageSigningEnabled=false `
          /p:AppxPackageDir="${{ github.workspace }}\BuildArtifacts\" `
          /p:AppxBundle=Never

    - name: Debug File System Layout
      shell: powershell
      run: |
        Write-Host "========================================================="
        Write-Host " CHECKING BuildArtifacts FOLDER "
        Write-Host "========================================================="
        if (Test-Path "BuildArtifacts") {
            Get-ChildItem -Path "BuildArtifacts" -Recurse | Select-Object -ExpandProperty FullName
        } else {
            Write-Host "Folder BuildArtifacts does NOT exist!"
        }
        
    - name: Sign MSIX Package via SignTool
      shell: powershell
      env:
        CERT_PASS: ${{ secrets.CERT_PASSWORD }}
      run: |
        # Find signtool.exe
        $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recurse | Where-Object { $_.DirectoryName -like "*x64*" } | Select-Object -First 1).FullName
        
        # Search for .msix everywhere in workspace to be 100% sure
        $msixFile = (Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.msix" -Recurse | Select-Object -First 1).FullName
        
        if (-not $msixFile) {
            Write-Error "CRITICAL: MSIX file was not found anywhere!"
            exit 1
        }
        
        Write-Output "Signing package: $msixFile using $signtool"
        & $signtool sign /v /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f "${{ github.workspace }}\CI_SigningCert.pfx" /p "$env:CERT_PASS" $msixFile
        
    - name: Upload Finished MSIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Saku-Overclock-MSIX-Package
        path: BuildArtifacts\**\*.msix
        if-no-files-found: error
        
